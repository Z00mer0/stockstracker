        - text: Jeżeli we wniosku o dopuszczenie do obrotu pojawiają się wartości wyrażone w walucie obcej (np. progi kapitalizacyjne 15 mln EUR lub 1 mln EUR), przelicza się je według
        - strong [ref=e146]: średniego kursu NBP z dnia poprzedzającego dzień złożenia wniosku
        - text: . Zasada sztywna, niepodlegająca negocjacjom.
      - paragraph [ref=e147]:
