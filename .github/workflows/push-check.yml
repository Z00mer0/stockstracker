name: push-check
on:
  schedule:
    - cron: '*/10 * * * *'
    # punktualność podsumowań sesji (czasy letnie); okna czasowe po stronie serwera pilnują poprawności
    - cron: '40 13 * * 1-5'   # otwarcie USA ~9:40 EDT
    - cron: '10 20 * * 1-5'   # zamknięcie USA ~16:10 EDT
    - cron: '10 7 * * 1-5'    # otwarcie GPW ~9:10 CEST
    - cron: '15 15 * * 1-5'   # zamknięcie GPW ~17:15 CEST
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push check
        run: |
          curl -fsS -X POST \
            -H "X-Push-Secret: ${{ secrets.PUSH_CRON_SECRET }}" \
            --max-time 120 --retry 2 -o /dev/null \
            https://stockstracker.onrender.com/api/push/check
